<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EFL Championship Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3a;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
    }

    header h1 span {
      color: #5b9bd5;
    }

    #status {
      font-size: 0.8rem;
      color: #888;
    }

    .legend {
      display: flex;
      gap: 16px;
      padding: 12px 24px;
      font-size: 0.75rem;
      color: #aaa;
      flex-wrap: wrap;
      background: #13161f;
      border-bottom: 1px solid #2a2d3a;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .dot-auto { background: #2563eb; }
    .dot-play { background: #16a34a; }
    .dot-rel  { background: #dc2626; }
    .dot-mid  { background: #3a3d4a; }

    /* ========== DESKTOP TABLE ========== */
    .table-wrap {
      overflow: auto;
      padding: 20px 24px;
      max-height: calc(100vh - 110px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #2a2d3a;
      position: sticky;
      top: 0;
      background: #0f1117;
      z-index: 1;
    }

    thead th.num { text-align: right; }

    tbody tr.team-row td {
      padding: 10px 12px;
      border-bottom: 1px solid #1e2130;
      vertical-align: middle;
    }

    tbody tr.team-row:hover td { background: #1a1d27; }

    tbody tr.desc-row td {
      padding: 2px 12px 10px 52px;
      font-size: 0.78rem;
      color: #888;
      border-bottom: 1px solid #1e2130;
      font-style: italic;
    }

    /* Zone accent (left border) */
    tr.zone-auto td:first-child { border-left: 3px solid #2563eb; }
    tr.zone-play td:first-child { border-left: 3px solid #16a34a; }
    tr.zone-rel  td:first-child { border-left: 3px solid #dc2626; }
    tr.zone-mid  td:first-child { border-left: 3px solid transparent; }

    .pos-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .badge-auto { background: #1d4ed8; color: #fff; }
    .badge-play { background: #15803d; color: #fff; }
    .badge-rel  { background: #b91c1c; color: #fff; }
    .badge-mid  { background: #2a2d3a; color: #ccc; }

    .team-name { font-weight: 500; font-size: 0.95rem; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }

    .pct-cell {
      text-align: right;
      font-weight: 600;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
    }

    /* Probability colour scale */
    .pct-high  { color: #4ade80; }
    .pct-med   { color: #facc15; }
    .pct-low   { color: #f87171; }
    .pct-none  { color: #4a4a5a; }

    /* ========== MOBILE CARDS ========== */
    .cards-wrap {
      display: none;
      padding: 12px 14px;
      gap: 10px;
      flex-direction: column;
    }

    .card {
      background: #1a1d27;
      border-radius: 8px;
      border-left: 4px solid transparent;
      padding: 12px 14px;
      cursor: pointer;
    }

    .card.zone-auto { border-left-color: #2563eb; }
    .card.zone-play { border-left-color: #16a34a; }
    .card.zone-rel  { border-left-color: #dc2626; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .card-meta {
      display: flex;
      gap: 14px;
      font-size: 0.78rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .card-meta span strong { color: #e0e0e0; }

    .card-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .pill-auto { background: #1d3461; color: #7baff5; }
    .pill-play { background: #143d20; color: #4ade80; }
    .pill-rel  { background: #3d1414; color: #f87171; }

    .card-desc {
      display: none;
      font-size: 0.78rem;
      color: #888;
      font-style: italic;
      margin-top: 6px;
      line-height: 1.4;
    }

    .card.expanded .card-desc { display: block; }

    /* ========== FIXTURE PANEL ========== */
    tbody tr.fixture-row td {
      padding: 0 12px 12px 52px;
      border-bottom: 1px solid #1e2130;
    }

    tbody tr.fixture-row.hidden { display: none; }

    .team-row { cursor: pointer; }

    .fixture-panel { font-size: 0.8rem; }

    .fixture-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 4px;
    }

    .fixture-table th {
      text-align: left;
      padding: 4px 8px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      border-bottom: 1px solid #2a2d3a;
    }

    .fixture-table th.num { text-align: right; }

    .fixture-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #1a1d27;
      color: #ccc;
    }

    .fixture-table td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .ha-home { color: #7baff5; font-weight: 600; }
    .ha-away { color: #f9a825; font-weight: 600; }

    .fx-win  { color: #4ade80; font-weight: 600; }
    .fx-draw { color: #facc15; font-weight: 600; }
    .fx-loss { color: #f87171; font-weight: 600; }
    .fx-xpts { color: #c084fc; font-weight: 600; }

    .fixture-spinner, .fixture-empty {
      padding: 8px 0;
      color: #666;
      font-style: italic;
    }

    /* Mobile fixture list inside card */
    .card-fixtures {
      display: none;
      margin-top: 10px;
    }

    .card.expanded .card-fixtures { display: block; }

    .card-fixtures .fixture-table th,
    .card-fixtures .fixture-table td { padding: 4px 6px; }

    /* ========== LOADING / ERROR ========== */
    #loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1rem;
    }

    #error-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: #f87171;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 767px) {
      .table-wrap { display: none; }
      .cards-wrap { display: flex; }
      header { padding: 12px 14px; }
      header h1 { font-size: 1.1rem; }
      .legend { padding: 10px 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>EFL <span>Championship</span> Probability Tracker</h1>
  <div id="status">Loading...</div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot dot-auto"></div> Automatic Promotion (1–2)</div>
  <div class="legend-item"><div class="legend-dot dot-play"></div> Playoffs (3–6)</div>
  <div class="legend-item"><div class="legend-dot dot-mid"></div> Mid-table (7–21)</div>
  <div class="legend-item"><div class="legend-dot dot-rel"></div> Relegation (22–24)</div>
</div>

<div id="loading">Loading table data...</div>
<div id="error-msg">Failed to load data. Please try again later.</div>

<!-- Desktop Table -->
<div class="table-wrap" id="table-wrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th style="width:44px">#</th>
        <th>Team</th>
        <th class="num">P</th>
        <th class="num">Pts</th>
        <th class="num">GD</th>
        <th class="num">Left</th>
        <th class="num">xPts</th>
        <th class="num">Auto%</th>
        <th class="num">Playoff%</th>
        <th class="num">Rel%</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- Mobile Cards -->
<div class="cards-wrap" id="cards-wrap"></div>

<script>
  const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 minutes
  let expandedTeamId = null;

  function zoneClass(pos) {
    if (pos <= 2) return 'zone-auto';
    if (pos <= 6) return 'zone-play';
    if (pos <= 21) return 'zone-mid';
    return 'zone-rel';
  }

  function badgeClass(pos) {
    if (pos <= 2) return 'badge-auto';
    if (pos <= 6) return 'badge-play';
    if (pos <= 21) return 'badge-mid';
    return 'badge-rel';
  }

  function pctClass(val, type) {
    // type: 'auto'|'playoff'|'rel'
    const v = parseFloat(val);
    if (type === 'rel') {
      if (v >= 40) return 'pct-low';
      if (v >= 15) return 'pct-med';
      if (v > 0)   return 'pct-high';
      return 'pct-none';
    }
    if (v >= 60) return 'pct-high';
    if (v >= 25) return 'pct-med';
    if (v > 0)   return 'pct-low';
    return 'pct-none';
  }

  function fmt(val) {
    const v = parseFloat(val);
    if (v < 0.1) return '<0.1%';
    return v.toFixed(1) + '%';
  }

  function timeAgo(dateStr) {
    if (!dateStr) return 'Never updated';
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60) return 'Updated just now';
    if (diff < 3600) return `Updated ${Math.floor(diff / 60)}m ago`;
    return `Updated ${Math.floor(diff / 3600)}h ago`;
  }

  function buildFixtureHtml(data) {
    if (!data.length) return '<div class="fixture-empty">No remaining fixtures.</div>';
    let html = `<table class="fixture-table">
      <thead><tr>
        <th>Date</th><th>Opponent</th><th>H/A</th>
        <th class="num">Win%</th><th class="num">Draw%</th><th class="num">Loss%</th><th class="num">xPts</th>
      </tr></thead><tbody>`;
    for (const f of data) {
      const d = f.date ? new Date(f.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : '—';
      const ha = f.home_away === 'H' ? '<span class="ha-home">H</span>' : '<span class="ha-away">A</span>';
      html += `<tr>
        <td>${d}</td>
        <td>${escHtml(f.opponent)}</td>
        <td>${ha}</td>
        <td class="num fx-win">${parseFloat(f.win_pct).toFixed(1)}%</td>
        <td class="num fx-draw">${parseFloat(f.draw_pct).toFixed(1)}%</td>
        <td class="num fx-loss">${parseFloat(f.loss_pct).toFixed(1)}%</td>
        <td class="num fx-xpts">${f.xpts}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    return html;
  }

  function fetchFixtures(teamId, panelEl) {
    panelEl.innerHTML = '<div class="fixture-spinner">Loading fixtures…</div>';
    fetch(`/api/fixtures/${teamId}`)
      .then(r => r.json())
      .then(json => {
        panelEl.innerHTML = json.ok ? buildFixtureHtml(json.data) : '<div class="fixture-empty">Failed to load fixtures.</div>';
      })
      .catch(() => { panelEl.innerHTML = '<div class="fixture-empty">Failed to load fixtures.</div>'; });
  }

  function renderDesktop(rows) {
    const tbody = document.getElementById('table-body');
    tbody.innerHTML = '';
    expandedTeamId = null;

    for (const r of rows) {
      const zone = zoneClass(r.position);
      const badge = badgeClass(r.position);

      const teamRow = document.createElement('tr');
      teamRow.className = `team-row ${zone}`;
      teamRow.dataset.teamId = r.team_id;
      teamRow.innerHTML = `
        <td><span class="pos-badge ${badge}">${r.position}</span></td>
        <td><span class="team-name">${escHtml(r.team_name)}</span></td>
        <td class="num">${r.played}</td>
        <td class="num">${r.points}</td>
        <td class="num">${r.goal_difference >= 0 ? '+' : ''}${r.goal_difference}</td>
        <td class="num">${r.games_remaining}</td>
        <td class="num">${r.expected_points != null ? parseFloat(r.expected_points).toFixed(1) : '—'}</td>
        <td class="num pct-cell ${pctClass(r.auto_promotion_pct, 'auto')}">${fmt(r.auto_promotion_pct)}</td>
        <td class="num pct-cell ${pctClass(r.playoff_pct, 'playoff')}">${fmt(r.playoff_pct)}</td>
        <td class="num pct-cell ${pctClass(r.relegation_pct, 'rel')}">${fmt(r.relegation_pct)}</td>
      `;
      tbody.appendChild(teamRow);

      if (r.description) {
        const descRow = document.createElement('tr');
        descRow.className = `desc-row ${zone}`;
        descRow.innerHTML = `<td colspan="10">${escHtml(r.description)}</td>`;
        tbody.appendChild(descRow);
      }

      const fixtureRow = document.createElement('tr');
      fixtureRow.className = `fixture-row ${zone} hidden`;
      fixtureRow.dataset.teamId = r.team_id;
      fixtureRow.innerHTML = `<td colspan="10"><div class="fixture-panel"></div></td>`;
      tbody.appendChild(fixtureRow);

      teamRow.addEventListener('click', () => {
        const tid = r.team_id;
        const panel = fixtureRow.querySelector('.fixture-panel');

        if (expandedTeamId === tid) {
          // Collapse
          fixtureRow.classList.add('hidden');
          expandedTeamId = null;
        } else {
          // Collapse any previously open row
          if (expandedTeamId !== null) {
            const prev = tbody.querySelector(`.fixture-row[data-team-id="${expandedTeamId}"]`);
            if (prev) prev.classList.add('hidden');
          }
          fixtureRow.classList.remove('hidden');
          expandedTeamId = tid;
          fetchFixtures(tid, panel);
        }
      });
    }
  }

  function renderMobile(rows) {
    const wrap = document.getElementById('cards-wrap');
    wrap.innerHTML = '';
    let expandedCardTeamId = null;

    for (const r of rows) {
      const zone = zoneClass(r.position);
      const badge = badgeClass(r.position);
      const gdStr = (r.goal_difference >= 0 ? '+' : '') + r.goal_difference;

      const card = document.createElement('div');
      card.className = `card ${zone}`;
      card.innerHTML = `
        <div class="card-header">
          <span class="pos-badge ${badge}">${r.position}</span>
          <span class="team-name">${escHtml(r.team_name)}</span>
        </div>
        <div class="card-meta">
          <span>P <strong>${r.played}</strong></span>
          <span>Pts <strong>${r.points}</strong></span>
          <span>GD <strong>${gdStr}</strong></span>
          <span>Left <strong>${r.games_remaining}</strong></span>
          <span>xPts <strong>${r.expected_points != null ? parseFloat(r.expected_points).toFixed(1) : '—'}</strong></span>
        </div>
        <div class="card-pills">
          <span class="pill pill-auto">🔵 Auto ${fmt(r.auto_promotion_pct)}</span>
          <span class="pill pill-play">🟢 Play ${fmt(r.playoff_pct)}</span>
          <span class="pill pill-rel">🔴 Rel ${fmt(r.relegation_pct)}</span>
        </div>
        ${r.description ? `<div class="card-desc">${escHtml(r.description)}</div>` : ''}
        <div class="card-fixtures"></div>
      `;

      card.addEventListener('click', () => {
        const tid = r.team_id;
        const fixturesEl = card.querySelector('.card-fixtures');
        const isExpanding = !card.classList.contains('expanded');

        // Collapse all other cards
        wrap.querySelectorAll('.card.expanded').forEach(c => {
          if (c !== card) c.classList.remove('expanded');
        });

        card.classList.toggle('expanded');

        if (isExpanding && expandedCardTeamId !== tid) {
          expandedCardTeamId = tid;
          fetchFixtures(tid, fixturesEl);
        } else if (!card.classList.contains('expanded')) {
          expandedCardTeamId = null;
        }
      });

      wrap.appendChild(card);
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadData() {
    try {
      const [tableRes, statusRes] = await Promise.all([
        fetch('/api/table'),
        fetch('/api/status')
      ]);

      const tableJson = await tableRes.json();
      const statusJson = await statusRes.json();

      if (!tableJson.ok || !tableJson.data.length) {
        throw new Error('No data available yet — check back shortly.');
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('table-wrap').style.display = '';
      document.getElementById('cards-wrap').style.display = '';

      renderDesktop(tableJson.data);
      renderMobile(tableJson.data);

      document.getElementById('status').textContent = timeAgo(statusJson.last_updated);
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'block';
      errEl.textContent = err.message || 'Failed to load data.';
    }
  }

  loadData();
  setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
